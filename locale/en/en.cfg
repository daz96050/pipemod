[mod-setting-description]
afh-simple-recipes=Flattens pipe recipes to their base materials and hides the intermediate items (couplers, pipe segments, swivel joint). Base pipes need only iron; higher tiers use their own tier material (e.g. niobium under Pyanodon). Adds Foundry casting recipes when Space Age is active.\nNote: the intermediate items are hidden and disabled while this is on, so existing blueprints or production lines that build or use them will break.
afhfp-longer-undergrounds=Keeps the distances equal to vanilla AFH

